<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CronoFocus</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="shortcut icon" href="assets/images/relógio.ico" type="image/x-icon">
</head>
<body>
    <header>
        <div id="logo">
            <svg viewBox="0 0 16.00 16.00" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#000000" stroke-width="0.00016" transform="matrix(1, 0, 0, 1, 0, 0)rotate(0)">
            <g id="SVGRepo_bgCarrier" stroke-width="0"/>
            <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round" stroke="#CCCCCC" stroke-width="0.032"/>
            <g id="SVGRepo_iconCarrier"> <path d="M3.95706 1.45712L1.45706 3.95712L0.0428467 2.54291L2.54285 0.0429077L3.95706 1.45712Z" fill="currentColor"/> <path fill-rule="evenodd" clip-rule="evenodd" d="M14.4999 8.50003C14.4999 9.80523 14.1152 11.0206 13.453 12.0389L15.707 14.2929L14.2928 15.7071L12.1163 13.5307C10.9954 14.449 9.56199 15 7.99986 15C6.43776 15 5.00436 14.449 3.88344 13.5307L1.70701 15.7071L0.2928 14.2929L2.54678 12.0389C1.88457 11.0206 1.49986 9.80525 1.49986 8.50003C1.49986 4.91018 4.41001 2.00003 7.99986 2.00003C11.5897 2.00003 14.4999 4.91018 14.4999 8.50003ZM6.99995 5V9.41421L9.29285 11.7071L10.7071 10.2929L8.99995 8.58579V5H6.99995Z" fill="currentColor"/> <path d="M14.5428 3.95714L12.0428 1.45714L13.457 0.0429222L15.957 2.54292L14.5428 3.95714Z" fill="currentColor"/> </g>
            </svg>
            <h1>CronoFocus</h1>
        </div>
        <nav>
            <span class="material-symbols-outlined" id="botao-configuracoes">settings</span>
        </nav>
    </header>
    <main>
        <section id="hora-principal">
            <div class="bloco-timer" id="bloco-horas">
                <p>Horas</p>
                <div class="timer" id="horas">05</div>
            </div>
            <div class="bloco-timer" id="bloco-minutos">
                <p>Minutos</p>
                <div class="timer" id="minutos">30</div>
            </div>
            <div class="bloco-timer" id="bloco-segundos">
                <p>Segundos</p>
                <div class="timer" id="segundos">00</div>
            </div>
        </section>
        <section id="botoes">
            <span class="material-symbols-outlined" id="botao-play">play_arrow</span>
            <span class="material-symbols-outlined" id="botao-pause">pause</span>
            
            <button id="botao-iniciar">Iniciar</button>
        </section>
        <section id="marcador-tempo"></section>
    </main>
    <!--
    <span class="material-symbols-outlined">dark_mode</span>
    -->  
    <script src="assets/js/script.js"></script>
</body>
</html>
